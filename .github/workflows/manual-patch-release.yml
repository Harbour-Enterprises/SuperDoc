name: 🚀 Manual Patch Release

on:
  workflow_dispatch:
    inputs:
      dist-tag:
        description: pnpm dist-tag to publish under
        required: false
        default: beta

permissions:
  contents: read
  packages: write

jobs:
  manual-patch-release:
    runs-on: ubuntu-latest
    env:
      DIST_TAG: ${{ github.event.inputs.dist-tag || 'beta' }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061 # Pinned commit hash for @v4

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: pnpm

      - name: Update pnpm
        run: pnpm install -g pnpm@latest

      - name: Install dependencies
        run: pnpm install

      - name: Bump patch version (no git tag)
        run: pnpm --workspace=superdoc version patch --no-git-tag-version

      - name: Build packages
        run: pnpm run build

      - name: Publish patch release
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: node scripts/publish-superdoc.cjs --dist-tag "${DIST_TAG}" --skip-build

      - name: Show published version
        run: node -e "console.log('published version:', require('./packages/superdoc/package.json').version)"
